<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TORERUNO: Beauty Blast Run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- HUD Layer -->
        <div id="hud">
            <div class="hud-top">
                <div class="stat-box power-box">
                    <span class="label">POWER</span>
                    <span id="power-value" class="value">1</span>
                </div>
                <div class="stat-box score-box">
                    <span class="label">PURIFIED</span>
                    <span id="score-value" class="value">0</span>
                </div>
            </div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <!-- Canvas Layer -->
        <canvas id="gameCanvas"></canvas>

        <!-- Start Overlay -->
        <div id="start-screen" class="overlay">
            <div class="content">
                <h1 class="game-title">TORERUNO<br><span>Beauty Blast Run</span></h1>
                <p class="instruction">ドラッグして移動 & 浄化！</p>
                <button id="start-button">START ESTHETIC</button>
            </div>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over-screen" class="overlay hidden">
            <div class="content">
                <h2 class="title">LEVEL CLEAR!</h2>
                <div class="final-stats">
                    <p>Purified: <span id="final-score">0</span></p>
                </div>
                <button id="restart-button">NEXT TREATMENT</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
